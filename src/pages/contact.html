  <!-- Main Content -->
  <main class="main-content">
    <div class="contact-content">
      <div class="page-header">
        <h1 class="page-title">Get in Touch</h1>
        <p class="page-subtitle">I&apos;d love to hear from you! Whether you have a question, want to collaborate, or are interested in commissioning a piece, feel free to reach out.</p>
      </div>

      <!-- Contact Form -->
      <!-- Note: For GitHub Pages, use a service like Formspree, Netlify Forms, or similar -->
      <form class="contact-form" action="https://formspree.io/f/xrevezkd" method="POST">
        <div class="form-group">
          <label for="name">Name *</label>
          <input type="text" id="name" name="name" required>
        </div>
        
        <div class="form-group">
          <label for="email">Email *</label>
          <input type="email" id="email" name="email" required>
        </div>
        
        <div class="form-group">
          <label for="subject">Subject</label>
          <select id="subject" name="subject">
            <option value="">Select a topic...</option>
            <option value="commission">Commission Inquiry</option>
            <option value="collaboration">Collaboration</option>
            <option value="press">Press / Media</option>
            <option value="general">General Inquiry</option>
          </select>
        </div>
        
        <div class="form-group">
          <label for="message">Message *</label>
          <textarea id="message" name="message" required placeholder="Tell me about your project or question..."></textarea>
        </div>
        
        <button type="submit" class="btn">Send Message</button>
      </form>

      <div style="margin-top: 60px; padding-top: 40px; border-top: 1px solid var(--color-border);">
        <p style="color: var(--color-text-light); margin-bottom: 12px;">You can also reach me directly at:</p>
        <p><a href="mailto:kulrich07@outlook.com" style="color: var(--color-accent);">kulrich07@outlook.com</a></p>
      </div>
    </div>
  </main>
