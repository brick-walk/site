<section class="mx-auto max-w-[72rem] px-4 py-10 sm:px-6 lg:px-8">
  <div class="grid items-start gap-8 lg:grid-cols-[minmax(0,1.9fr)_minmax(18rem,0.78fr)] xl:gap-10">
    <!-- Left: gallery -->
    <div class="min-w-0">
      <figure class="overflow-hidden bg-zinc-100 dark:bg-zinc-900">
        <img
          src="{{MAIN_SRC}}"
          alt="{{TITLE}}"
          class="aspect-[4/3] w-full object-cover"
          loading="eager"
        />
      </figure>

      <section aria-label="Additional views" class="mt-4">
        <div class="grid grid-cols-2 gap-3 sm:grid-cols-4">
          {{VIEWS_HTML}}
        </div>
      </section>
    </div>

    <!-- Right: content -->
    <article class="w-full lg:sticky lg:top-24">
      <a
        href="/builds"
        class="inline-block text-sm text-zinc-500 underline-offset-4 hover:text-zinc-900 hover:underline dark:hover:text-zinc-100"
      >
        ← {{BUILD_TYPE_LABEL}}
      </a>

      <header class="mt-5 border-b border-zinc-200 pb-5 dark:border-zinc-800">
        <h1 class="text-3xl font-medium tracking-[0.12em] text-zinc-950 dark:text-zinc-50 sm:text-4xl">
          {{TITLE}}
        </h1>
      </header>

      <div class="pt-5">
        <p class="text-base leading-8 text-zinc-700 dark:text-zinc-300">
          {{DESCRIPTION}}
        </p>

        <ul class="mt-6 space-y-4 text-sm leading-8 text-zinc-600 dark:text-zinc-400">
          <li class="flex gap-3">
            <span class="mt-[0.9em] h-1 w-1 shrink-0 rounded-full bg-zinc-400 dark:bg-zinc-500"></span>
            <span>Category: {{BUILD_TYPE_LABEL}}</span>
          </li>
          <li class="flex gap-3">
            <span class="mt-[0.9em] h-1 w-1 shrink-0 rounded-full bg-zinc-400 dark:bg-zinc-500"></span>
            <span>Title: {{TITLE}}</span>
          </li>
        </ul>

        <div class="mt-8">
          <a
            href="#"
            class="inline-flex items-center justify-center bg-zinc-900 px-6 py-3 text-sm font-semibold uppercase tracking-[0.14em] text-white transition hover:bg-zinc-700 dark:bg-zinc-100 dark:text-zinc-950 dark:hover:bg-zinc-300"
          >
            More info
          </a>
        </div>
      </div>
    </article>
  </div>
</section>
