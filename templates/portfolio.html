<section class="mx-auto max-w-6xl px-4 py-12 sm:px-6 lg:px-8">
  <div class="mb-8 border-b border-zinc-200 pb-4 dark:border-zinc-800">
    <p class="text-sm uppercase tracking-[0.2em] text-zinc-500">{{BUILD_TYPE_LABEL}}</p>
    <h1 class="mt-2 text-4xl font-semibold tracking-tight text-zinc-950 dark:text-zinc-50">
      {{TITLE}}
    </h1>
  </div>

  <div class="grid gap-10 lg:grid-cols-[minmax(0,1.5fr)_minmax(20rem,1fr)] lg:items-start">
    <div class="space-y-5">
      <figure class="overflow-hidden rounded-2xl bg-zinc-100 dark:bg-zinc-900">
        <img
          src="{{MAIN_SRC}}"
          alt="{{TITLE}}"
          class="h-full w-full object-cover"
          loading="eager"
        />
      </figure>

      <section aria-label="Additional views">
        <div class="grid grid-cols-2 gap-3 sm:grid-cols-3">
          {{VIEWS_HTML}}
        </div>
      </section>
    </div>

    <article class="lg:sticky lg:top-24">
      <div class="rounded-2xl border border-zinc-200 bg-white p-6 shadow-sm dark:border-zinc-800 dark:bg-zinc-950">
        <h2 class="text-xl font-semibold text-zinc-950 dark:text-zinc-50">About this build</h2>
        <p class="mt-4 text-base leading-7 text-zinc-700 dark:text-zinc-300">
          {{DESCRIPTION}}
        </p>

        <dl class="mt-8 space-y-3 border-t border-zinc-200 pt-6 text-sm dark:border-zinc-800">
          <div class="flex items-start justify-between gap-4">
            <dt class="text-zinc-500">Category</dt>
            <dd class="text-right text-zinc-900 dark:text-zinc-100">{{BUILD_TYPE_LABEL}}</dd>
          </div>
          <div class="flex items-start justify-between gap-4">
            <dt class="text-zinc-500">Title</dt>
            <dd class="text-right text-zinc-900 dark:text-zinc-100">{{TITLE}}</dd>
          </div>
        </dl>
      </div>
    </article>
  </div>
</section>
